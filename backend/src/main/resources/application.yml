server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import: optional:classpath:secret.yml,optional:file:./secret.yml,optional:file:./config/secret.yml
  application:
    name: project-manager-backend
  datasource:
    url: ${DB_URL:${secret.db.url}}
    username: ${DB_USERNAME:${secret.db.username}}
    password: ${DB_PASSWORD:${secret.db.password}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:${secret.mail.username:}}
    password: ${MAIL_PASSWORD:${secret.mail.password:}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:${secret.openai.api-key:}}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4.1-nano}
          temperature: ${OPENAI_TEMPERATURE:0.4}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}}
  jwt:
    secret: ${JWT_SECRET:${secret.jwt.secret}}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:86400}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:${secret.mail.username:}}}
