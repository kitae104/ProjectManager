server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import: optional:classpath:secret.yml,optional:file:./secret.yml,optional:file:./config/secret.yml
  application:
    name: project-manager-backend
  datasource:
    url: ${DB_URL:${secret.db.url}}
    username: ${DB_USERNAME:${secret.db.username}}
    password: ${DB_PASSWORD:${secret.db.password}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}}
  jwt:
    secret: ${JWT_SECRET:${secret.jwt.secret}}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:86400}
